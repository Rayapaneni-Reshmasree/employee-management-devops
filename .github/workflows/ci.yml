name: CI

on:
  push:
    branches:
      - main

jobs:

  backend:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Backend Test
        run: |
          cd backend
          npm install

  frontend:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Frontend Test
        run: |
          cd frontend
          npm install
